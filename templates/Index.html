<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Prompt 管理系統</title>
    <!-- Bootstrap 樣式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.0"></script>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h1 class="mb-4">Prompt 管理系統</h1>

        <!-- 新增表單 -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">新增 Prompt</h5>
                <form hx-post="/prompts" hx-target="#prompt-list" hx-swap="innerHTML">
                    <div class="mb-3">
                        <input type="text" name="title" class="form-control" placeholder="標題" required>
                    </div>
                    <div class="mb-3">
                        <textarea name="positive" class="form-control" placeholder="Positive Prompt" required></textarea>
                    </div>
                    <div class="mb-3">
                        <textarea name="negative" class="form-control" placeholder="Negative Prompt"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">新增</button>
                </form>
            </div>
        </div>

        <!-- Prompt 列表 -->
        <div id="prompt-list">
            <!-- 這裡之後會動態填入資料 -->
        </div>
    </div>

</body>
</html>
