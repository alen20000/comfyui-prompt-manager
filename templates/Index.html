<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Prompt 管理系統</title>
    <!-- Bootstrap 樣式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.0"></script>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h1 class="mb-4">Prompt 管理系統</h1>

        <!-- 新增表單 -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">新增 Prompt</h5>
                <form hx-post="/prompts"  hx-swap="innerHTML">
                    <div class="mb-3">
                        <input type="text" name="title" class="form-control" placeholder="標題" required>
                    </div>

                </form>
                    <button type="button"
                            hx-target="#prompt-list"
                            hx-get="/get_all_prompts" 
                            hx-swap="innerHTML"
                            class="btn btn-secondary mb-3">
                        顯示所有提示詞
                    </button>
                <div id="prompt-list"></div>
            </div>
        </div>
        </div>
    </div>

</body>
</html>
