<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Prompt 管理系統</title>
    <!-- Bootstrap 樣式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

    <div class="container mt-5">
        <h1 class="mb-4">Prompt-Management-Assistant</h1>

        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">測試</h5>

                <button id="show_all_data" class="btn btn-secondary mb-3">
                    顯示全部資料
                </button>
                
                <button id="delect-display-content-btn" class="btn btn-secondary mb-3">
                    清空顯示板
                </button>
                <button id="add_prompt-btn" class="btn btn-secondary mb-3">
                    新增 Prompt
                </button>
                <button id="add_prompt-btn" class="btn btn-secondary mb-3">
                    刪除 Prompt
                </button>
                <button id="add_prompt-btn" class="btn btn-secondary mb-3">
                    更改 Prompt
                </button>

            </div>
            <div class="container mt-5">

                <table id="display_result" class="table table-striped table-hover border">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 5%;">ID</th>
                            <th style="width: 5%;">分類</th>
                            <th style="width: 25%;">內容</th>
                            
                            <th style="width: 25%;">備註</th>
                        </tr>
                    </thead>
                    <tbody id="data_body">
                        </tbody>
                </table>

            </div>
        </div>

    </div>
<script>

    const btn_show_all_data = document.querySelector('#show_all_data')
    btn_show_all_data.addEventListener('click', () =>{
            fetch('/get_all_prompts')
                .then(res => res.json())   // then完成後會直接給下個then 變數是拋棄式的
                .then(data =>{
                    const rows = data.data;
                    const display_result = document.querySelector('#data_body');
                    console.log(data);

                    let html = "";
                    rows.forEach(item => {

                        html +=`
                        <tr>
                            <td>${item.id}</td>
                            <td>${item.prompt_class}</td>
                            <td>${item.prompt}</td>
                            <td>${item.comment}</td>
                        </tr>
                    `;
                        
                    });

                    display_result.innerHTML = html;
                });

    const cleaBtn = document.querySelector('#delect-display-content-btn');
    cleaBtn.addEventListener('click', () =>{
        data_body.innerHTML = "";
    });
});
</script>
</body>`
</html>
