<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Prompt 管理系統</title>
    <!-- Bootstrap 樣式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- HTMX -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12"></script>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h1 class="mb-4">Prompt-Management-Assistant</h1>

        <!-- 新增表單 -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">測試</h5>
                <!-- <form hx-post="/prompts"  hx-swap="innerHTML">
                    <div class="mb-3">
                        <input type="text" name="title" class="form-control" placeholder="標題" required>
                    </div>

                </form> -->
                <button type="button"
                        hx-target="#prompt-list"
                        hx-get="/get_all_prompts" 
                        hx-swap="innerHTML"
                        class="btn btn-secondary mb-3">
                    顯示所有提示詞
                </button>
                <style>
                    #prompt-list {
                    background-color: #f0f8ff; /* 淺藍色背景 */
                    border: 2px solid #000000;  /* 2像素寬的實線藍色邊框 */         /* 給它一個最小高度，不然沒東西時會縮成一條線 */
                    }
                </style>
                <div id="prompt-list">
                    
                </div>
            </div>
        </div>

    </div>
<script>
fetch('/get_all_prompts')
    .then(response => response.json()) // 這裡會自動解析 JSON
    .then(data => {
        // 現在你可以直接用 . 存取那 5 個欄位了
        console.log(data.result[0].title); 
        console.log(data.result[0].content);
    });
</script>
</body>
</html>
